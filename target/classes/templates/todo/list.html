<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a href="/todo/new" class="btn btn-primary">新規登録</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="px-4">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" class="pe-4">ステータス</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td class="px-4" th:text="${todo.id()}">1</td>
                    <td th:text="${todo.title()}">サンプルタスク</td>
                    <td class="pe-4" th:text="${todo.status()}">未着手</td>
                </tr>
                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="3" class="text-center py-4 text-muted">ToDoがありません</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
