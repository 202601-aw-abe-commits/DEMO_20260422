<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo登録確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="h3 mb-4">登録内容の確認</h1>
            <form th:action="@{/todo/complete}" action="/todo/complete" method="post">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <label for="title" class="form-label">タイトル</label>
                        <input id="title" type="text" class="form-control" th:value="${title}" readonly>
                        <input type="hidden" name="title" th:value="${title}">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">登録</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back()">戻る</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
