<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a href="/todo/new" class="btn btn-primary">新規登録</a>
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="px-4">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" class="pe-4">完了状態</th>
                    <th scope="col" class="text-center pe-4">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td class="px-4" th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">サンプルタスク</td>
                    <td class="pe-4" th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                    <td class="text-center pe-4">
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card border-0 shadow-sm bg-light" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">最初のToDoを作成して、タスク管理を始めましょう。</p>
            <a href="/todo/new" class="btn btn-primary px-4">新規作成</a>
        </div>
    </div>
</main>
</body>
</html>
